[platformio]
default_envs = pico32-ota

[env:pico32-ota]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = pico32
framework = arduino

; Serial Monitor options
monitor_speed = 115200
test_ignore = *

; OTA partition scheme - 2x 1.5MB app partitions
board_build.partitions = partitions_ota.csv
board_build.filesystem = littlefs

; Hybrid compile: custom_sdkconfig triggers recompilation of IDF libs from source.
; The builder merges these entries with the Arduino base sdkconfig and writes the
; result to sdkconfig.defaults (a build artifact, gitignored). Our documented
; reference copy lives in sdkconfig.project (git-tracked, never overwritten).
; First build will be slow (~10-20 min); subsequent builds use cached libs.
custom_sdkconfig =
    CONFIG_PM_ENABLE=y
    CONFIG_FREERTOS_USE_TICKLESS_IDLE=y
    CONFIG_FREERTOS_IDLE_TIME_BEFORE_SLEEP=3
    CONFIG_ESP_COREDUMP_ENABLE_TO_FLASH=y
    CONFIG_ESP_COREDUMP_DATA_FORMAT_ELF=y
    CONFIG_ESP_COREDUMP_CHECKSUM_CRC32=y
    CONFIG_BT_ENABLED=n
    CONFIG_FREERTOS_HZ=1000
    CONFIG_ESP_PHY_MAX_WIFI_TX_POWER=10
    CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM=4
    CONFIG_LWIP_PBUF_POOL_SIZE=12
    CONFIG_LWIP_TCPIP_RECVMBOX_SIZE=32
    CONFIG_LWIP_TCP_RECVMBOX_SIZE=8
    CONFIG_LWIP_UDP_RECVMBOX_SIZE=6
    CONFIG_ESP_BROWNOUT_DET_LVL_SEL_0=y
    ; ── mbedTLS configuration ──
    ; The hybrid compile recompiles BOTH IDF libs AND Arduino NetworkClientSecure
    ; against the same generated sdkconfig.h — struct sizes are ABI-consistent.
    ; Asymmetric buffers: 16KB IN / 4KB OUT saves ~12KB per TLS connection.
    CONFIG_MBEDTLS_ASYMMETRIC_CONTENT_LEN=y
    CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=16384
    CONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=4096
    ; Disable peer certificate storage after handshake (never used). Saves ~1-2KB.
    CONFIG_MBEDTLS_SSL_KEEP_PEER_CERTIFICATE=n
    ; Cipher removal: forces AES-GCM which uses ESP32 hardware AES accelerator.
    CONFIG_MBEDTLS_CHACHA20_C=n
    CONFIG_MBEDTLS_POLY1305_C=n
    CONFIG_MBEDTLS_CHACHAPOLY_C=n
    ; ── WiFi sleep optimizations ──
    ; Place WiFi TBTT/beacon processing in IRAM for faster sleep/wake transitions.
    ; Costs ~1.3KB IRAM but reduces average current during modem-sleep.
    CONFIG_ESP_WIFI_SLP_IRAM_OPT=y
    ; Reduce minimum WiFi active time after wake (default 50ms → 8ms minimum).
    CONFIG_ESP_WIFI_SLP_DEFAULT_MIN_ACTIVE_TIME=8
    ; ── NTP via DHCP ──
    ; Enable DHCP option 42 (NTP server) so the device can discover
    ; NTP servers from the local network when not explicitly configured.
    CONFIG_LWIP_DHCP_GET_NTP_SRV=y
    ; ── File System optimizations ──
    ; We need to reduce WL/FATFS sector sizes from 4096 to 512 to prevent an 18KB
    ; heap drop during SD card mount. However, due to ESP-IDF and PlatformIO
    ; quirks, a 3-tiered workaround is required:
    ;
    ; Layer 1: PlatformIO's INI parser strips `#` comment-style config entries,
    ;          so we must use an external `file://` reference to preserve the
    ;          `# CONFIG_X is not set` lines.
    ; Layer 2: ESP-IDF Kconfig requires UNSETTING the default _4096 booleans,
    ;          otherwise it falls back to 4096 despite CONFIG_WL_SECTOR_SIZE=512.
    ;          (See sdkconfig.project for these entries).
    file://sdkconfig.project

; Remove managed components we don't use (pulled in by hybrid compile base config).
; esp_insights embeds certificates that cause path errors; everything else is bloat.
custom_component_remove =
    espressif/esp_insights
    espressif/esp_diagnostics
    espressif/esp_diag_data_store
    espressif/esp_rainmaker
    espressif/rmaker_common
    espressif/esp_schedule
    espressif/jsmn
    espressif/json_generator
    espressif/json_parser
    espressif/network_provisioning
    espressif/esp_secure_cert_mgr
    espressif/esp-zboss-lib
    espressif/esp-zigbee-lib
    espressif/esp_rcp_update
    espressif/esp-modbus
    espressif/esp_modem
    espressif/esp-serial-flasher
    espressif/esp-dsp
    espressif/fb_gfx
    espressif/cbor
    espressif/lan867x
    espressif/lan86xx_common
    espressif/libsodium
    espressif/qrcode
    chmorgan/esp-libhelix-mp3

; Pre-build scripts
extra_scripts = 
    pre:scripts/generate_version_prebuild.py
    pre:scripts/generate_html_gz.py

; Build flags - same as base + OTA support
build_flags = 
    -Os
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -DCORE_DEBUG_LEVEL=3
    ; Layer 3 of 512-byte sector fix: Arduino's SD_MMC.cpp uses the deprecated
    ; FatFs R0.13 macro `_MAX_SS`. Without defining it to match `FF_MAX_SS`, the
    ; preprocessor evaluates it as 0, taking a code path looking for a removed
    ; `ssize` struct member, causing a compile error when FF_MAX_SS=512.
    -D_MAX_SS=FF_MAX_SS
    -Icomponents/libsmb2/include
    -DENABLE_SMB_UPLOAD          ; Enable SMB/CIFS upload support
    -DENABLE_SLEEPHQ_UPLOAD      ; Enable Cloud/SleepHQ upload support (uses HTTPS + OAuth)
    -DENABLE_WEBSERVER      ; Enable web server for on-demand upload testing
    -DENABLE_OTA_UPDATES         ; Enable Over-The-Air update functionality
    -DENABLE_LOG_RESOURCE_SUFFIX ; Append [res fh=.. ma=.. fd=..] to each log line (diagnostics only)
    -DLOG_BUFFER_SIZE=8192      ; ~8KB buffer (~70 lines) — prevents LOG GAP during boot
    -DARDUINO_LOOP_STACK_SIZE=8192   ; 8KB stack for loop task

; Library dependencies - same as base + OTA libraries
lib_deps = 
    bblanchon/ArduinoJson@^6.21.3

lib_extra_dirs = components
upload_speed = 115200

; Native testing environment
[env:native]
platform = native
build_flags = 
    -DUNIT_TEST
    -std=c++11
    -I include
    -I test/mocks
test_framework = unity
test_build_src = yes
; Exclude ESP32-specific source files from native build
; Tests will include only the specific components they need
build_src_filter = 
    -<*>
